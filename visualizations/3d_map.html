<!DOCTYPE html>
<html>
<head>
    <title>Хроносфера - 3D визуализация</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px;
            border-radius: 5px;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="info">
        <h2>Хроносфера</h2>
        <p>Центральный войд: 798 Мпк | Поток: 194 км/с</p>
        <p>Направление CMB диполя: l=264°, b=48°</p>
    </div>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);
        scene.fog = new THREE.FogExp2(0x050510, 0.0005);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 2000);
        camera.position.set(800, 400, 800);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        
        // Звезды
        const starGeometry = new THREE.BufferGeometry();
        const starCount = 3000;
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPositions[i*3] = (Math.random() - 0.5) * 2000;
            starPositions[i*3+1] = (Math.random() - 0.5) * 2000;
            starPositions[i*3+2] = (Math.random() - 0.5) * 1000;
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const stars = new THREE.Points(starGeometry, new THREE.PointsMaterial({ color: 0xffffff, size: 0.5 }));
        scene.add(stars);
        
        // Центральный войд (сфера радиусом 798 Мпк)
        const voidGeometry = new THREE.SphereGeometry(798, 64, 64);
        const voidMaterial = new THREE.MeshPhongMaterial({
            color: 0xff4444,
            transparent: true,
            opacity: 0.15,
            emissive: 0x331100
        });
        const voidSphere = new THREE.Mesh(voidGeometry, voidMaterial);
        scene.add(voidSphere);
        
        // Ободок
        const edgeMaterial = new THREE.MeshBasicMaterial({ color: 0xff6666, wireframe: true, transparent: true, opacity: 0.25 });
        const voidEdge = new THREE.Mesh(voidGeometry, edgeMaterial);
        scene.add(voidEdge);
        
        // Галактики (точки)
        const galaxyCount = 8000;
        const galaxyPositions = [];
        for (let i = 0; i < galaxyCount; i++) {
            const theta = Math.acos(2 * Math.random() - 1);
            const phi = 2 * Math.PI * Math.random();
            const r = Math.pow(Math.random(), 1.3) * 900;
            const x = r * Math.sin(theta) * Math.cos(phi);
            const y = r * Math.sin(theta) * Math.sin(phi);
            const z = r * Math.cos(theta);
            galaxyPositions.push(x, y, z);
        }
        const galaxyGeometry = new THREE.BufferGeometry();
        galaxyGeometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(galaxyPositions), 3));
        const galaxies = new THREE.Points(galaxyGeometry, new THREE.PointsMaterial({ color: 0x88aaff, size: 0.6, transparent: true, opacity: 0.6 }));
        scene.add(galaxies);
        
        // Радиальные линии
        const rayMaterial = new THREE.LineBasicMaterial({ color: 0xffaa55 });
        for (let i = 0; i < 48; i++) {
            const theta = Math.acos(2 * Math.random() - 1);
            const phi = 2 * Math.PI * Math.random();
            const dx = Math.sin(theta) * Math.cos(phi);
            const dy = Math.sin(theta) * Math.sin(phi);
            const dz = Math.cos(theta);
            const points = [new THREE.Vector3(0, 0, 0), new THREE.Vector3(dx * 750, dy * 750, dz * 750)];
            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            const line = new THREE.Line(geometry, rayMaterial);
            scene.add(line);
        }
        
        // CMB диполь направление
        const cmbDir = new THREE.Vector3(0.4067, 0.9135, 0.0175).normalize();
        const cmbArrow = new THREE.ArrowHelper(cmbDir, new THREE.Vector3(0, 0, 0), 700, 0xffdd44, 30, 20);
        scene.add(cmbArrow);
        
        // Ось зла
        const axisDir = new THREE.Vector3(0.4060, 0.9140, 0.0170).normalize();
        const axisArrow = new THREE.ArrowHelper(axisDir, new THREE.Vector3(0, 0, 0), 700, 0x44aaff, 30, 20);
        scene.add(axisArrow);
        
        // Освещение
        const ambientLight = new THREE.AmbientLight(0x222222);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(1, 1, 1);
        scene.add(directionalLight);
        const centerLight = new THREE.PointLight(0xff6644, 0.8);
        centerLight.position.set(0, 0, 0);
        scene.add(centerLight);
        
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            stars.rotation.y += 0.0005;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
